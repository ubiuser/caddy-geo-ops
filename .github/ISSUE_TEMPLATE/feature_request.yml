name: ✨ Feature request
description: Suggest an enhancement or new capability.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Please check the [README](../../blob/main/README.md) and existing issues first.
        Note the project's **non-goals** in CLAUDE.md (no access-policy engine, no GUI, no
        bundled databases, no lookup cache).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that you can't today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Caddyfile / placeholder examples welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
