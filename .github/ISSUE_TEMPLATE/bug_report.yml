name: 🐛 Bug report
description: Something isn't working as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please don't include MaxMind license keys, account IDs,
        or real client IPs in logs/configs you paste below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal Caddyfile and the request(s) that trigger it, if possible.
      placeholder: |
        1. Caddyfile: ...
        2. Request: curl ...
        3. Observed: ...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant Caddyfile / config
      render: caddyfile
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Run with debug logging if you can. Redact IPs and credentials.
      render: text
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: The caddy-geo-ops version (e.g. v1.2.3) you built with.
    validations:
      required: true
  - type: input
    id: caddy-version
    attributes:
      label: Caddy version
      description: Output of `caddy version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / architecture
      placeholder: e.g. linux/amd64, windows/amd64
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: Database(s) in use
      multiple: true
      options:
        - MaxMind GeoIP2
        - MaxMind GeoLite2
        - DB-IP Lite
        - Other / not relevant
