name: PR Title

# Validates that PR titles follow Conventional Commits (e.g. "feat: ...",
# "fix(matcher): ..."). Squash-merge uses the PR title as the commit subject, so
# this keeps history and the generated release notes consistent. See CONTRIBUTING.md.
on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write # post a comment explaining an invalid title

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed Conventional Commit types.
          types: |
            feat
            fix
            docs
            test
            refactor
            perf
            build
            ci
            chore
            revert
