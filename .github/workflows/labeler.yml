name: Labeler

# Auto-applies labels to PRs based on the files they touch (rules in
# .github/labeler.yml). The release-notes config (.github/release.yml) groups
# the changelog by label, so this keeps `documentation` and `dependencies` PRs
# correctly grouped without manual triage. Type labels that aren't path-derivable
# (bug / feature / breaking-change) are still applied by hand — see CONTRIBUTING.md.
on:
  pull_request_target:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # apply labels to the PR
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
