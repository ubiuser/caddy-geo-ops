name: Security

on:
  push:
    branches: [main]
  pull_request:
  # Weekly run so advisories published against already-pinned dependencies
  # surface even when no code changes.
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Known-vulnerability scan of the dependency tree. govulncheck uses call-graph
  # analysis, so it only reports a CVE if the vulnerable symbol is reachable.
  # Both modules are scanned; the root is what users compile into Caddy, e2e is
  # the test harness (its findings are dev/CI hygiene).
  govulncheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [".", "e2e"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # Resolve to the newest patch of the go.mod minor (e.g. 1.26.5, not a
          # cached 1.26.4). Go standard-library advisories are fixed in patch
          # releases, so the scan must run on the patched toolchain — otherwise
          # govulncheck fails on stdlib CVEs the plugin cannot itself avoid
          # (the consumer's toolchain, not this code, is what actually matters).
          check-latest: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

  # Stable aggregate check for branch protection: passes only if govulncheck
  # succeeded for every module, so required-status-checks can reference one fixed
  # "govulncheck-gate" context instead of each per-module name. `if: always()` makes
  # it run (and report) even when a matrix cell failed.
  govulncheck-gate:
    if: always()
    needs: [govulncheck]
    runs-on: ubuntu-latest
    steps:
      - name: Require govulncheck to have passed
        run: |
          if [ "${{ needs.govulncheck.result }}" != "success" ]; then
            echo "govulncheck result: ${{ needs.govulncheck.result }}"
            exit 1
          fi

  # On PRs, flag newly-introduced dependencies that carry known vulnerabilities
  # or licenses incompatible with this project's MIT license.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  # Scan the working tree / history for committed secrets (e.g. a MaxMind
  # license key). gitleaks-action is free for public and personal repositories.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
