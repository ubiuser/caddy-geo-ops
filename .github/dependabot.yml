---
version: 2
updates:
  # GitHub Actions used by the CI and release workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 1
    groups:
      actions-deps:
        patterns:
          - "*"
    schedule:
      interval: "monthly"
    # Conventional-Commit title so the PR-title check passes and the squash commit
    # is conventional, e.g. "chore(deps): Bump ...".
    commit-message:
      prefix: "chore"
      include: "scope"

  # Plugin (root) Go module.
  - package-ecosystem: "gomod"
    directory: "/"
    open-pull-requests-limit: 1
    groups:
      all-updates:
        patterns:
          - "*"
    schedule:
      interval: "monthly"
    # Conventional-Commit title so the PR-title check passes and the squash commit
    # is conventional, e.g. "chore(deps): Bump ...".
    commit-message:
      prefix: "chore"
      include: "scope"

  # e2e Go module (separate go.mod with the caddytest dep tree).
  - package-ecosystem: "gomod"
    directory: "/e2e"
    open-pull-requests-limit: 1
    groups:
      all-updates:
        patterns:
          - "*"
    schedule:
      interval: "monthly"
    # Conventional-Commit title so the PR-title check passes and the squash commit
    # is conventional, e.g. "chore(deps): Bump ...".
    commit-message:
      prefix: "chore"
      include: "scope"

  # MaxMind-DB git submodule (test fixtures): bump to the latest tracked commit.
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    open-pull-requests-limit: 1
    schedule:
      interval: "monthly"
    # Conventional-Commit title so the PR-title check passes and the squash commit
    # is conventional, e.g. "chore(deps): Bump ...".
    commit-message:
      prefix: "chore"
      include: "scope"
